<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Obvious Place: Signal Orchard</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0e110e;
        color: #eef5e6;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at 50% 30%, #1a2418 0%, #0e110e 62%, #090b09 100%);
      }

      #wrap {
        width: min(100vw, 1040px);
        padding: 14px;
        box-sizing: border-box;
      }

      canvas {
        width: 100%;
        aspect-ratio: 16 / 9;
        display: block;
        image-rendering: auto;
        border: 1px solid rgba(238, 245, 230, 0.16);
        border-radius: 18px;
        background: #121512;
        box-shadow: 0 20px 70px rgba(0, 0, 0, 0.38);
      }

      #status {
        margin-top: 10px;
        font-size: 13px;
        line-height: 1.45;
        color: rgba(238, 245, 230, 0.84);
      }
    </style>
  </head>
  <body>
    <main id="wrap">
      <canvas id="game" width="960" height="540" aria-label="Obvious Place first playable canvas"></canvas>
      <div id="status">Loading NexusRealtime kit graph...</div>
    </main>

    <script type="module">
      import { createObviousPlaceEngine, GAME_REVISION } from "./game-snapshot.mjs";

      const canvas = document.querySelector("#game");
      const status = document.querySelector("#status");
      const ctx = canvas.getContext("2d");
      const engine = createObviousPlaceEngine();
      const keys = new Set();
      let lastTime = performance.now();
      let primaryLatch = false;
      let restartLatch = false;

      window.addEventListener("keydown", (event) => {
        if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(event.key)) {
          event.preventDefault();
        }
        keys.add(event.key.toLowerCase());
      });

      window.addEventListener("keyup", (event) => {
        keys.delete(event.key.toLowerCase());
      });

      function consumeAction(key) {
        const pressed = keys.has(key);
        if (key === " " || key === "space") {
          const next = pressed && !primaryLatch;
          primaryLatch = pressed;
          return next;
        }
        const next = pressed && !restartLatch;
        restartLatch = pressed;
        return next;
      }

      function readIntent() {
        const left = keys.has("a") || keys.has("arrowleft");
        const right = keys.has("d") || keys.has("arrowright");
        const up = keys.has("w") || keys.has("arrowup");
        const down = keys.has("s") || keys.has("arrowdown");
        return {
          x: (right ? 1 : 0) - (left ? 1 : 0),
          y: (down ? 1 : 0) - (up ? 1 : 0),
          primary: consumeAction(" "),
          restart: consumeAction("r")
        };
      }

      function drawText(text, x, y, options = {}) {
        ctx.save();
        ctx.fillStyle = options.color ?? "#eef5e6";
        ctx.font = options.font ?? "14px Inter, system-ui, sans-serif";
        ctx.textAlign = options.align ?? "left";
        ctx.fillText(text, x, y);
        ctx.restore();
      }

      function lineObject(object) {
        ctx.save();
        ctx.strokeStyle = object.color;
        ctx.lineWidth = object.width;
        ctx.lineCap = "round";
        ctx.globalAlpha = 0.72;
        ctx.beginPath();
        ctx.moveTo(object.from.x, object.from.y);
        ctx.lineTo(object.to.x, object.to.y);
        ctx.stroke();
        ctx.restore();
      }

      function circleObject(object) {
        ctx.save();
        ctx.fillStyle = object.color;
        ctx.strokeStyle = "rgba(238, 245, 230, 0.2)";
        ctx.lineWidth = 2;
        if (object.kind === "pulse") ctx.globalCompositeOperation = "lighter";
        if (object.kind === "hazard") ctx.globalAlpha = 0.88;
        ctx.beginPath();
        ctx.arc(object.x, object.y, object.radius, 0, Math.PI * 2);
        ctx.fill();
        if (object.kind !== "pulse") ctx.stroke();
        if (object.kind === "relay" || object.kind === "extract") {
          ctx.globalAlpha = 1;
          ctx.fillStyle = object.lit || object.open ? "#121512" : "rgba(18, 21, 18, 0.78)";
          ctx.beginPath();
          ctx.arc(object.x, object.y, Math.max(5, object.radius * 0.28), 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      }

      function draw(render) {
        const world = render.world;
        const hud = render.hud;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = world.background;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for (const object of render.objects.filter((entry) => entry.layer === "ground")) lineObject(object);
        for (const object of render.objects.filter((entry) => entry.layer === "marker")) circleObject(object);
        for (const object of render.objects.filter((entry) => entry.layer === "hazard")) circleObject(object);
        for (const object of render.objects.filter((entry) => entry.layer === "effect")) circleObject(object);
        for (const object of render.objects.filter((entry) => entry.layer === "actor")) circleObject(object);

        ctx.save();
        ctx.fillStyle = "rgba(9, 11, 9, 0.62)";
        ctx.fillRect(16, 14, 520, 92);
        ctx.strokeStyle = "rgba(238, 245, 230, 0.14)";
        ctx.strokeRect(16, 14, 520, 92);
        ctx.restore();

        drawText(hud.title, 30, 38, { font: "700 19px Inter, system-ui, sans-serif" });
        drawText(hud.objective, 30, 64, { color: "#d9f7b4" });
        drawText(`Relays ${hud.relays}   Health ${hud.health}   Time ${hud.secondsLeft}s   Score ${hud.score}`, 30, 88, { color: "#eef5e6" });

        if (hud.status !== "playing") {
          ctx.save();
          ctx.fillStyle = "rgba(9, 11, 9, 0.76)";
          ctx.fillRect(250, 190, 460, 150);
          ctx.strokeStyle = "rgba(238, 245, 230, 0.24)";
          ctx.strokeRect(250, 190, 460, 150);
          ctx.restore();
          drawText(hud.status === "won" ? "EXTRACTED" : "FAILED", 480, 235, {
            align: "center",
            font: "800 28px Inter, system-ui, sans-serif",
            color: hud.status === "won" ? "#b9f7f0" : "#d56c77"
          });
          drawText(hud.statusReason ?? "Restart with R.", 480, 270, { align: "center" });
          drawText("Press R to restart", 480, 302, { align: "center", color: "#d9f7b4" });
        }
      }

      function frame(now) {
        const delta = Math.min(0.05, Math.max(0.001, (now - lastTime) / 1000));
        lastTime = now;
        engine.inputIntent.set(readIntent(), { source: "browser" });
        engine.tick(delta);
        const render = engine.obviousPlace.renderSnapshot();
        draw(render);
        status.textContent = `${GAME_REVISION} | ${render.hud.help}`;
        document.body.dataset.ready = "true";
        requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    </script>
  </body>
</html>
